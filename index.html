<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Candy Box</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fff3e6, #ffe0f0);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

h1 {
    margin-bottom: 5px;
}

p {
    margin-top: 0;
    opacity: 0.7;
}

.box {
    width: 320px;
    height: 220px;
    background: #d2691e;
    border-radius: 15px;
    position: relative;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-content: center;
}

.candy {
    width: 40px;
    height: 40px;
    margin: 6px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.3s ease;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.candy:hover {
    transform: scale(1.2);
}

.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
}

.popup-content {
    background: white;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    max-width: 300px;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

button {
    margin-top: 15px;
    padding: 8px 14px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🎉 Birthday Candy Box 🎉</h1>
<p>Pick a candy and open your surprise</p>

<div class="box" id="box"></div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="title"></h2>
        <p id="message"></p>
        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script>
const messages = [
    "You are the reason remote work actually works. Thank you!",
    "Coffee is on me next time we meet ☕",
    "You just unlocked a virtual high-five 🙌",
    "You are secretly the glue of the team.",
    "Take a break today—you’ve earned it.",
    "You just got a happiness boost +10%",
    "One free excuse to skip one boring meeting.",
    "Your energy makes deadlines less scary.",
    "You deserve cake. Extra slice included.",
    "You unlocked: unlimited good vibes for today."
];

const colors = ["#ff6b6b", "#ffd93d", "#6bcB77", "#4d96ff", "#c77dff", "#ff8fab", "#ffa94d"];

const box = document.getElementById("box");

// create candies
for (let i = 0; i < 24; i++) {
    const candy = document.createElement("div");
    candy.classList.add("candy");
    candy.style.background = colors[Math.floor(Math.random() * colors.length)];
    
    candy.onclick = function () {
        openCandy(candy);
    };

    box.appendChild(candy);
}

function openCandy(candy) {
    if (candy.dataset.opened) return;

    candy.dataset.opened = true;
    candy.style.transform = "scale(0)";
    candy.style.opacity = "0";

    const msg = messages[Math.floor(Math.random() * messages.length)];

    document.getElementById("title").innerText = "🍬 Surprise!";
    document.getElementById("message").innerText = msg;

    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
